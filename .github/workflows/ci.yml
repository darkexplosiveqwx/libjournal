name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --target journal-demo test-journal

      - name: Test
        run: ctest --test-dir build --output-on-failure

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake musl-tools

      - name: Build
        run: ./build.sh static

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests in container
        run: ./build.sh test container
